<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save Moore | Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="site-shell">
    <nav class="top-nav" aria-label="Main navigation">
      <p class="brand">Save Moore</p>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="current-sales.html">Current Sales</a></li>
        <li><a href="contact.html">Contact Us</a></li>
        <li><a href="review.html">Leave a Review</a></li>
        <li><a class="active" href="login.html">Login</a></li>
      </ul>
    </nav>

    <main class="content">
      <section class="section-card">
        <h1>User Login</h1>
        <p class="subtitle">Sign in to manage your sales posts and account details.</p>
        <form>
          <div class="form-grid">
            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="you@example.com" required />
            </div>
            <div>
              <label for="password">Password</label>
              <input id="password" name="password" type="password" placeholder="Enter password" required />
            </div>
          </div>
          <button type="submit">Login</button>
        </form>
      </section>

      <p class="footer-note">Save Moore — Curated sales with timeless style.</p>
    </main>
  </div>
</body>
</html>
