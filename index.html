<!DOCTYPE html>

</head>
<body class="intro-page">

  <div class="intro-shell">
    <h1 class="intro-title">Save Moore</h1>
    <span class="intro-tagline">Local Yard Sale &amp; Marketplace</span>

  <script>
    const loginLink = document.getElementById("intro-login");
