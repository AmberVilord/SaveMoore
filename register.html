<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save Moore | Register</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="auth.js"></script>
  <script>if (isLoggedIn()) window.location.href = 'home.html';</script>
</head>
<body>
  <div class="site-shell">
    <nav class="top-nav" aria-label="Main navigation">
      <p class="brand">Save Moore</p>
      <ul class="nav-links">
        <li><a href="login.html">Login</a></li>
        <li><a class="active" href="register.html">Register</a></li>
      </ul>
    </nav>

    <main class="content">
      <section class="section-card">
        <h1>Create an Account</h1>
        <p class="subtitle">Register to browse current sales, post your own items, and more.</p>
        <p id="reg-error"   style="color:#e57373;margin-bottom:0.5rem;display:none;"></p>
        <p id="reg-success" style="color:#81c784;margin-bottom:0.5rem;display:none;"></p>
        <form id="register-form">
          <div class="form-grid">
            <div>
              <label for="name">Full Name</label>
              <input id="name" name="name" type="text" placeholder="Your full name" required />
            </div>
            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="you@example.com" required />
            </div>
          </div>
          <div class="form-grid">
            <div>
              <label for="password">Password</label>
              <input id="password" name="password" type="password" placeholder="Choose a password (min 6 chars)" required />
            </div>
            <div>
              <label for="confirm-password">Confirm Password</label>
              <input id="confirm-password" name="confirm-password" type="password" placeholder="Repeat your password" required />
            </div>
          </div>
          <button type="submit">Create Account</button>
        </form>
        <p style="margin-top:1rem;color:var(--text-muted);font-size:0.93rem;">
          Already have an account?
          <a href="login.html" style="color:var(--blue-soft);text-decoration:none;">Login here</a>
        </p>
      </section>

      <p class="footer-note">Save Moore — Curated sales with timeless style.</p>
    </main>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      var name     = document.getElementById('name').value.trim();
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var confirm  = document.getElementById('confirm-password').value;
      var errorEl  = document.getElementById('reg-error');
      var okEl     = document.getElementById('reg-success');

      errorEl.style.display = 'none';
      okEl.style.display    = 'none';

      if (password !== confirm) {
        errorEl.textContent  = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errorEl.textContent  = 'Password must be at least 6 characters.';
        errorEl.style.display = 'block';
        return;
      }

      var result = await registerUser(name, email, password);
      if (result.success) {
        okEl.textContent  = 'Account created! Redirecting to login…';
        okEl.style.display = 'block';
        setTimeout(function () { window.location.href = 'login.html'; }, 1800);
      } else {
        errorEl.textContent  = result.message;
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
